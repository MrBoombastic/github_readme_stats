name: Deploy via Web Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/GitHubStats.sln

      - name: Build
        run: dotnet build src/GitHubStats.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish src/GitHubStats.Api/GitHubStats.Api.csproj -c Release -o publish --no-build

      - name: Inject secrets into appsettings.json
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        shell: python
        run: |
          import json, os
          with open('publish/appsettings.json', 'r') as f:
              cfg = json.load(f)
          cfg['GitHub']['PersonalAccessTokens'] = [os.environ['GH_STATS_TOKEN']]
          cfg['Cache']['RedisConnectionString'] = os.environ['REDIS_URL']
          with open('publish/appsettings.json', 'w') as f:
              json.dump(cfg, f, indent=2)

      - name: Deploy via Web Deploy
        env:
          DEPLOY_USER: ${{ vars.FTP_USERNAME }}
          DEPLOY_PASS: ${{ secrets.FTP_PASSWORD }}
        shell: cmd
        run: |
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
            -verb:sync ^
            -source:contentPath="%GITHUB_WORKSPACE%\publish" ^
            -dest:contentPath="github-readme-stats.tuhidulhossain.com",computerName="https://github-readme-stats.tuhidulhossain.com:8172/msdeploy.axd?site=github-readme-stats.tuhidulhossain.com",userName="%DEPLOY_USER%",password="%DEPLOY_PASS%",authType="basic" ^
            -enableRule:AppOffline ^
            -allowUntrusted ^
            -retryAttempts:3 ^
            -retryInterval:2000
