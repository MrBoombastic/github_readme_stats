name: Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/GitHubStats.sln

      - name: Build
        run: dotnet build src/GitHubStats.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish src/GitHubStats.Api/GitHubStats.Api.csproj -c Release -o publish --no-build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ vars.FTP_DIRECTORY }}
          dangerous-clean-slate: true
